<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – EarnProof</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff6b00; --orange-glow: rgba(255,107,0,0.15);
      --dark: #0a0a0a; --card: #141414; --card2: #1c1c1c;
      --border: rgba(255,107,0,0.2); --text: #f0f0f0; --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sora', sans-serif; background: var(--dark); color: var(--text); }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,107,0,0.10) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--orange); text-decoration: none; }
    .logo span { color: var(--text); }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--orange); background: var(--orange-glow); }

    .page-header { position: relative; z-index: 1; text-align: center; padding: 50px 20px 30px; }
    .page-header h1 { font-size: 28px; font-weight: 800; }
    .page-header h1 span { color: var(--orange); }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 8px; }

    .container { max-width: 500px; margin: 0 auto; padding: 0 16px 60px; position: relative; z-index: 1; }

    .contact-options { display: grid; gap: 12px; margin-bottom: 30px; }
    .contact-option {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 20px; display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: var(--text); transition: all 0.2s;
    }
    .contact-option:hover { border-color: var(--orange); background: var(--card2); }
    .contact-icon { font-size: 30px; flex-shrink: 0; }
    .contact-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .contact-value { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .contact-arrow { margin-left: auto; color: var(--orange); font-size: 18px; }

    .form-section {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    }
    .form-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 600; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group textarea {
      width: 100%; background: #0f0f0f; border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--orange); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .submit-btn {
      width: 100%; background: var(--orange); color: white; border: none;
      padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'Sora', sans-serif; transition: background 0.2s;
    }
    .submit-btn:hover { background: #e05e00; }

    footer { text-align: center; padding: 30px 20px; border-top: 1px solid var(--border); position: relative; z-index: 1; }
    footer p { font-size: 13px; color: var(--muted); }
    footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">Earn<span>Proof</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="earning-apps.html">Apps</a>
      <a href="fake-apps.html">Scams</a>
      <a href="payment-proof.html">Proof</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>📩 <span>Contact</span> Karo</h1>
    <p>Apna experience share karo ya koi sawaal poochho</p>
  </div>

  <div class="container">

    <div class="contact-options">
      <a class="contact-option" href="https://wa.me/923000000000" target="_blank">
        <div class="contact-icon">💬</div>
        <div>
          <div class="contact-label">WhatsApp</div>
          <div class="contact-value">Message Karo</div>
        </div>
        <div class="contact-arrow">→</div>
      </a>

      <a class="contact-option" href="mailto:earnproof@gmail.com">
        <div class="contact-icon">📧</div>
        <div>
          <div class="contact-label">Email</div>
          <div class="contact-value">earnproof@gmail.com</div>
        </div>
        <div class="contact-arrow">→</div>
      </a>
    </div>

    <div class="form-section">
      <h3>✍️ Ya Yahan Message Chhorein</h3>
      <div class="form-group">
        <label>Aapka Naam</label>
        <input type="text" placeholder="Naam likho...">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Apna experience ya sawaal yahan likho..."></textarea>
      </div>
      <button class="submit-btn">📤 Send Karo</button>
    </div>

  </div>

  <footer>
    <p>© 2026 <a href="index.html">EarnProof</a> — 100% Honest Reviews | Pakistan 🇵🇰</p>
  </footer>

</body>
</html>
